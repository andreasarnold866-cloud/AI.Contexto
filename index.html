<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contexto – Echte KI-Textanalyse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0b0f;
            --bg2: #121218;
            --bg3: #1c1c24;
            --text: #f3f4f6;
            --text2: #9ca3af;
            --border: #22222e;
            --brand: #6366f1;       
            --brand-hover: #4f46e5;
            --brand-light: rgba(99, 102, 241, 0.15);
            --red: #ef4444;
            --r: 12px;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body.light-theme {
            --bg: #f9fafb;          
            --bg2: #ffffff;         
            --bg3: #f3f4f6;         
            --text: #111827;        
            --text2: #4b5563;       
            --border: #e5e7eb;      
            --brand: #6366f1;       
            --brand-hover: #4f46e5;
            --brand-light: rgba(99, 102, 241, 0.15);
            --shadow: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.5; }

        nav { display: flex; align-items: center; justify-content: center; height: 70px; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top:0; z-index:100; box-shadow: 0 2px 10px var(--shadow); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .nav-logo { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); text-decoration: none; font-weight: bold; }
        .nav-logo span { color: var(--brand); }
        .nav-right { display: flex; gap: 10px; align-items: center; }

        .theme-btn { background: var(--bg3); color: var(--text); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; outline: none; font-weight: 500; }
        .theme-btn:hover { border-color: var(--brand); }
        
        .system-lang-select { background: var(--bg3); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; outline: none; }

        .hero { position: relative; padding: 40px 20px 20px 20px; text-align: center; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-family: 'DM Serif Display', serif; font-size: 44px; line-height: 1.1; margin-bottom: 16px; color: var(--text); }
        .highlight-word { color: var(--brand); font-style: normal; }
        .hero-sub { color: var(--brand); font-size: 16px; font-weight: 500; max-width: 600px; margin: 0 auto; min-height: 24px; }

        .tool-section { padding: 10px 20px 20px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .tool-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: 0 20px 40px var(--shadow); }
        .tool-topbar { background: var(--bg3); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .tb-left { display: flex; align-items: center; }
        .tb-dots { display: flex; gap: 6px; margin-right: 12px; }
        .tb-dot { width: 10px; height: 10px; border-radius: 50%; }
        .tb-dot.r { background: #ff5f56; } .tb-dot.y { background: #ffbd2e; } .tb-dot.g { background: #27c93f; }
        .tb-title { font-size: 12px; color: var(--text2); font-family: monospace; }

        .tool-body { padding: 24px; }

        .input-wrap { position: relative; margin-bottom: 16px; }
        textarea.main { width: 100%; height: 160px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 16px; padding-bottom: 50px; color: var(--text); font-size: 15px; resize: none; outline: none; }
        textarea.main:focus { border-color: var(--brand); }
        
        .input-toolbar { position: absolute; bottom: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .input-tools-left { display: flex; gap: 8px; pointer-events: auto; }
        .char-badge { font-size: 11px; color: var(--text2); background: var(--bg2); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); pointer-events: auto; }
        
        .inline-btn { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .inline-btn:hover { color: var(--text); border-color: var(--text2); }

        .trans-container { display: none; margin-bottom: 20px; background: var(--bg3); padding: 14px; border-radius: 8px; border: 1px solid var(--border); }
        .trans-container.active { display: block; }
        .trans-select { background: var(--bg2); color: var(--text); border: 1px solid var(--border); padding: 8px 14px; border-radius: 6px; font-size: 14px; outline: none; margin-top: 6px; width: 100%; max-width: 250px; cursor: pointer; }

        .label-sm { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 10px; font-weight: bold; }
        .modes-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
        .mode-btn { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); padding: 10px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 500; outline: none; }
        .mode-btn.active { background: var(--brand-light); color: var(--brand); border-color: var(--brand); }

        .run-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .run-btn { background: var(--brand); color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; flex: 1; box-shadow: 0 4px 10px var(--brand-light); }
        .run-btn:hover { background: var(--brand-hover); }
        .clear-btn { background: transparent; color: var(--text2); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
        .clear-btn:hover { color: var(--text); background: var(--bg3); }

        .result-wrap { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 20px; display: none; box-shadow: inset 0 2px 4px var(--shadow); margin-top: 10px; }
        .result-wrap.show { display: block; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .result-header h3 { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); }
        .result-actions { display: flex; gap: 8px; }
        
        .copy-btn, .download-btn, .speak-btn { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .copy-btn:hover, .download-btn:hover, .speak-btn:hover { color: var(--text); border-color: var(--text2); }
        .result-text { font-size: 15px; color: var(--text); line-height: 1.6; white-space: pre-line; }

        .history-box { margin-top: 24px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .history-list { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .history-item { background: var(--bg2); padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .history-item span.tag { font-weight: bold; color: var(--brand); text-transform: uppercase; font-size: 11px; background: var(--brand-light); padding: 2px 6px; border-radius: 4px; }

        .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #fileInput { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <a href="#" class="nav-logo">Context<span>o</span></a>
        <div class="nav-right">
            <select class="system-lang-select" id="systemLangSelect">
                <option value="DE">🌐 Deutsch (DE)</option>
                <option value="EN">🌐 English (EN)</option>
            </select>
            <button id="themeToggle" class="theme-btn">🌙 <span>Dark Mode</span></button>
        </div>
    </div>
</nav>

<section class="hero">
    <h1 id="mainTitle">Texte intelligent <em class="highlight-word">verstehen</em></h1>
    <p class="hero-sub" id="kiStatus">Bereit für die Textanalyse...</p>
</section>

<section class="tool-section" id="tool">
    <div class="container">
        <div class="tool-card">
            <div class="tool-topbar">
                <div class="tb-left">
                    <div class="tb-dots"><div class="tb-dot r"></div><div class="tb-dot y"></div><div class="tb-dot g"></div></div>
                    <span class="tb-title">contexto_live_netlify.js</span>
                </div>
            </div>

            <div class="tool-body">
                <div class="input-wrap">
                    <textarea class="main" id="inputText" placeholder="Füge hier deinen Text ein..."></textarea>
                    <div class="input-toolbar">
                        <div class="input-tools-left">
                            <button class="inline-btn" id="uploadBtn">📁 Datei einfügen</button>
                            <input type="file" id="fileInput" accept=".txt,.docx">
                            <button class="inline-btn" id="recordBtn">🎤 Diktieren</button>
                        </div>
                        <span class="char-badge" id="charCount">0 Zeichen</span>
                    </div>
                </div>

                <div class="trans-container" id="transContainer">
                    <div class="label-sm" id="lblTarget">🌐 Übersetzer-Optionen:</div>
                    <select class="trans-select" id="targetLang">
                        <option value="English">English</option>
                        <option value="Français">Français</option>
                        <option value="Español">Español</option>
                    </select>
                </div>

                <div class="label-sm" id="lblModules">Analyse-Modul wählen:</div>
                <div class="modes-row" id="modes">
                    <button class="mode-btn active" data-mode="summary" id="mSummary">📄 Zusammenfassung</button>
                    <button class="mode-btn" data-mode="explain" id="mExplain">💡 Einfach Erklären</button>
                    <button class="mode-btn" data-mode="rephrase_pro" id="mRephrase">💼 Profi-Stil</button>
                    <button class="mode-btn" data-mode="grammar" id="mGrammar">✏️ Grammatik-Check</button>
                    <button class="mode-btn" data-mode="translate" id="mTranslate">🌐 Übersetzer</button>
                </div>

                <div class="run-row">
                    <button class="run-btn" id="runBtn" onclick="analyze()">Analyse ausführen</button>
                    <button class="clear-btn" id="clearBtn">Zurücksetzen</button>
                </div>

                <div class="spinner" id="loadingSpinner"></div>

                <div class="result-wrap" id="resultWrap">
                    <div class="result-header">
                        <h3 id="resultTitle">Ergebnis</h3>
                        <div class="result-actions">
                            <button class="speak-btn" id="speakBtn">🔊 Vorlesen</button>
                            <button class="download-btn" id="downloadBtn">📥 Herunterladen</button>
                            <button class="copy-btn" id="copyBtn">📋 Kopieren</button>
                        </div>
                    </div>
                    <div id="resultBody" class="result-text"></div>
                </div>

                <div class="history-box">
                    <div class="label-sm" id="lblHistory">🕒 Analyse-Verlauf:</div>
                    <ul class="history-list" id="historyList"></ul>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    const translations = {
        DE: {
            title: "Texte intelligent <em class='highlight-word'>verstehen</em>",
            statusReady: "Bereit für die Textanalyse...",
            statusRunning: "🤖 Echte KI verarbeitet Datenstrom...",
            statusDone: "✅ Analyse abgeschlossen!",
            alertEmpty: "Bitte gib zuerst einen Text ein!",
            charCount: "Zeichen"
        }
    };

    let currentLang = 'DE';
    const textarea = document.getElementById('inputText');
    
    function updateCharCount() {
        document.getElementById('charCount').textContent = `${textarea.value.length} Zeichen`;
    }
    textarea.addEventListener('input', updateCharCount);

    // Dark Mode Toggle
    document.getElementById('themeToggle').addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
    });

    // Modus-Wahl
    let currentMode = 'summary';
    const modeButtons = document.querySelectorAll('.mode-btn');
    const transContainer = document.getElementById('transContainer');

    modeButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            modeButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.getAttribute('data-mode');
            transContainer.classList.toggle('active', currentMode === 'translate');
        });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        textarea.value = '';
        updateCharCount();
        document.getElementById('resultWrap').classList.remove('show');
    });

    // --- ECHTE LIVE-ANFRAGE AN DEINE NETLIFY-FUNCTION ---
    async function analyze() {
        const textInput = textarea.value.trim();
        if (!textInput) {
            alert(translations[currentLang].alertEmpty);
            return;
        }

        const spinner = document.getElementById('loadingSpinner');
        const resultWrap = document.getElementById('resultWrap');
        const resultBody = document.getElementById('resultBody');
        const statusText = document.getElementById('kiStatus');
        const historyList = document.getElementById('historyList');

        resultWrap.classList.remove('show');
        spinner.style.display = 'block';
        statusText.textContent = translations[currentLang].statusRunning;

        // System-Prompts für die KI definieren
        let systemPrompt = "Du bist ein präziser Textanalyse-Assistent. Antworte kurz und direkt.";
        if (currentMode === 'summary') {
            systemPrompt = "Erstelle eine übersichtliche, stichpunktartige Zusammenfassung des Textes auf Deutsch.";
        } else if (currentMode === 'explain') {
            systemPrompt = "Erkläre den folgenden Text extrem einfach, so als wäre ich 10 Jahre alt.";
        } else if (currentMode === 'rephrase_pro') {
            systemPrompt = "Schreibe den Text in einem hochprofessionellen, eleganten Business-Stil um.";
        } else if (currentMode === 'grammar') {
            systemPrompt = "Überprüfe den Text auf Grammatik und Rechtschreibung. Zeige Fehler direkt auf und korrigiere sie.";
        } else if (currentMode === 'translate') {
            const target = document.getElementById('targetLang').value;
            systemPrompt = `Übersetze den folgenden Text präzise in die Sprache: ${target}. Gib NUR die reine Übersetzung aus.`;
        }

        try {
            // Holt sich die Serverless-Logik von Netlify inklusive deinem Dashboard-Key
            const response = await fetch("/.netlify/functions/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    systemPrompt: systemPrompt,
                    userText: textInput
                })
            });

            if (!response.ok) {
                throw new Error("Fehler beim Abruf der Netlify-Funktion.");
            }

            const data = await response.json();
            const aiAnswer = data.choices[0].message.content;

            // Anzeigen der echten KI-Antwort
            spinner.style.display = 'none';
            resultWrap.classList.add('show');
            statusText.textContent = translations[currentLang].statusDone;
            document.getElementById('resultTitle').textContent = `Ergebnis (${currentMode.toUpperCase()})`;
            resultBody.textContent = aiAnswer;

            // Verlauf mitschreiben
            const words = textInput.split(' ');
            const keyword = words.slice(0, 3).join(' ') + (words.length > 3 ? '...' : '');
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `<span>"${keyword}"</span> <span class="tag">${currentMode.toUpperCase()}</span>`;
            historyList.insertBefore(li, historyList.firstChild);

        } catch (error) {
            spinner.style.display = 'none';
            statusText.textContent = "❌ Fehler aufgetreten.";
            alert("Echte KI-Abfrage fehlgeschlagen. Bitte prüfe, ob deine Netlify Function korrekt deployed wurde: " + error.message);
        }
    }
</script>
</body>
</html>
